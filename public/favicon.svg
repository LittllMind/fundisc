<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fond transparent -->
  <rect width="100" height="100" fill="transparent"/>
  
  <!-- Anneau vinyle extérieur -->
  <circle cx="50" cy="50" r="45" fill="#1a1a1a"/>
  
  <!-- Sillons vinyle -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#333" stroke-width="0.5"/>
  <circle cx="50" cy="50" r="32" fill="none" stroke="#333" stroke-width="0.5"/>
  <circle cx="50" cy="50" r="26" fill="none" stroke="#333" stroke-width="0.5"/>
  <circle cx="50" cy="50" r="20" fill="none" stroke="#333" stroke-width="0.5"/>
  
  <!-- Label central -->
  <circle cx="50" cy="50" r="15" fill="#f8f7f2"/>
  <circle cx="50" cy="50" r="12" fill="#b8a77d"/>
  
  <!-- Trou central -->
  <circle cx="50" cy="50" r="3" fill="#1a1a1a"/>
  
  <!-- FUN DISC text -->
  <text x="50" y="52" font-family="Arial, sans-serif" font-size="5" font-weight="bold" text-anchor="middle" fill="#1a1a1a">FUN</text>
</svg>