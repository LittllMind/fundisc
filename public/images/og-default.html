<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; width: 1200px; height: 630px; background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Inter', -apple-system, sans-serif; color: #f8f7f2; }
.title { font-size: 120px; font-weight: 900; letter-spacing: -0.02em; line-height: 0.9; }
.subtitle { font-size: 28px; color: #b8a77d; text-transform: uppercase; letter-spacing: 0.3em; margin-top: 40px; }
.tagline { font-size: 20px; color: #999; margin-top: 30px; }
.og-circle { width: 60px; height: 60px; border: 3px solid #333; border-radius: 50%; margin: 20px 0; }
.og-circle::before { content: ''; display: block; width: 20px; height: 20px; background: #b8a77d; border-radius: 50%; margin: 16px auto; }
</style>
</head>
<body>
<div class="og-circle"></div>
<div class="title">FUN DISC</div>
<div class="subtitle">VINYLES DÉCOUPÉS</div>
<div class="tagline">Chaque disque devient une œuvre d'art unique</div>
</body>
</html>
